<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UB Explorer — Ulaanbaatar Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f8f5f0;
      border-right: 1px solid #ddd;
      z-index: 10;
    }

    .sidebar-header {
      padding: 18px 20px 14px;
      background: #1a2b3c;
      color: #fff;
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      margin: 0 0 2px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .sidebar-header .subtitle {
      margin: 0;
      font-size: 12px;
      color: #93aec4;
    }

    .pin-stats {
      padding: 8px 20px;
      font-size: 12px;
      color: #777;
      background: #edeae5;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .pin-stats span {
      font-weight: 600;
      color: #444;
    }

    #pin-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 8px;
      list-style: none;
      margin: 0;
    }

    #pin-list::-webkit-scrollbar { width: 5px; }
    #pin-list::-webkit-scrollbar-track { background: transparent; }
    #pin-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .pin-item {
      background: #fff;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 7px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.1s;
      border: 1.5px solid transparent;
    }

    .pin-item:hover {
      box-shadow: 0 3px 10px rgba(0,0,0,0.13);
      transform: translateY(-1px);
    }

    .pin-item.visited {
      background: #f6fdf8;
      border-color: #b8e8c8;
    }

    .pin-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(0,0,0,0.12);
    }

    .pin-dot.unvisited { background: #e74c3c; }
    .pin-dot.visited   { background: #27ae60; }

    .pin-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pin-item.visited .pin-name { color: #2d6b46; }

    .btn-visit {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      cursor: pointer;
      background: none;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .btn-visit:hover { background: #e8f5ec; border-color: #27ae60; color: #27ae60; }
    .pin-item.visited .btn-visit:hover { background: #fdecea; border-color: #e74c3c; color: #e74c3c; }

    .btn-delete {
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      flex-shrink: 0;
      transition: color 0.12s, background 0.12s;
    }

    .btn-delete:hover { color: #e74c3c; background: #fdecea; }

    .empty-state {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 30px 20px;
      line-height: 1.6;
    }

    .empty-state .icon { display: block; font-size: 28px; margin-bottom: 8px; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
      background: #f0ede8;
    }

    #clear-all {
      width: 100%;
      padding: 8px;
      background: none;
      border: 1px solid #d0c8c0;
      border-radius: 6px;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    #clear-all:hover { background: #fdecea; border-color: #e74c3c; color: #e74c3c; }

    /* ── Map area ── */
    #map-area {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 43, 60, 0.82);
      color: #fff;
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      opacity: 1;
      transition: opacity 0.8s;
    }

    /* ── Modal ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.18s, visibility 0.18s;
    }

    #modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    #modal {
      background: #fff;
      border-radius: 12px;
      padding: 28px 28px 24px;
      width: 340px;
      max-width: 90vw;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      transform: translateY(10px);
      transition: transform 0.18s;
    }

    #modal-overlay.active #modal { transform: translateY(0); }

    #modal h2 {
      margin: 0 0 4px;
      font-size: 17px;
      color: #1a2b3c;
    }

    #modal p {
      margin: 0 0 14px;
      font-size: 12px;
      color: #999;
    }

    #modal-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      font-size: 15px;
      color: #222;
      outline: none;
      transition: border-color 0.15s;
    }

    #modal-input:focus { border-color: #1a2b3c; }
    #modal-input.error { border-color: #e74c3c; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: flex-end;
    }

    #modal-cancel {
      background: none;
      border: 1px solid #ccc;
      padding: 9px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #666;
    }

    #modal-cancel:hover { background: #f5f5f5; }

    #modal-confirm {
      background: #1a2b3c;
      color: #fff;
      border: none;
      padding: 9px 22px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.12s;
    }

    #modal-confirm:hover { background: #2c4a63; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: 220px 1fr;
      }
      #sidebar { border-right: none; border-bottom: 1px solid #ddd; }
      #map-area { height: 100%; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>UB Explorer</h1>
      <p class="subtitle">Ulaanbaatar, Mongolia</p>
    </div>
    <div class="pin-stats" id="pin-stats">
      <span>0</span> pins &nbsp;·&nbsp; <span>0</span> visited
    </div>
    <ul id="pin-list"></ul>
    <div class="sidebar-footer">
      <button id="clear-all">Clear All Pins</button>
    </div>
  </aside>

  <!-- Map area with hint overlay -->
  <div id="map-area">
    <div id="map"></div>
    <div class="map-hint" id="map-hint">Click anywhere on the map to add a pin</div>
  </div>

  <!-- Name modal -->
  <div id="modal-overlay">
    <div id="modal">
      <h2>Name this place</h2>
      <p>Give this location a memorable name.</p>
      <input id="modal-input" type="text" placeholder="e.g. Gandantegchinlen Monastery" maxlength="80" autocomplete="off" />
      <div class="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-confirm">Add Pin</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {

    // ── Constants ─────────────────────────────────────────────────
    var STORAGE_KEY = 'ub_pins';
    var UB_CENTER   = [47.9077, 106.8832];
    var UB_BOUNDS   = L.latLngBounds([47.85, 106.70], [47.95, 107.00]);

    // ── LocalStorage ──────────────────────────────────────────────
    function loadPins() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch (e) { return []; }
    }

    function savePins(pins) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    }

    // ── XSS guard ─────────────────────────────────────────────────
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ── Map init ──────────────────────────────────────────────────
    var map = L.map('map', {
      center:             UB_CENTER,
      zoom:               13,
      minZoom:            12,
      maxZoom:            18,
      maxBounds:          UB_BOUNDS,
      maxBoundsViscosity: 1.0
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // Re-measure container once all resources are loaded
    window.addEventListener('load', function () { map.invalidateSize(); });

    // ── Icons ─────────────────────────────────────────────────────
    function makeIcon(visited) {
      var fill = visited ? '#27ae60' : '#e74c3c';
      var svg = [
        '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">',
          '<path d="M14 0 C6.3 0 0 6.3 0 14 C0 24.5 14 38 14 38 C14 38 28 24.5 28 14 C28 6.3 21.7 0 14 0 Z"',
                ' fill="' + fill + '" stroke="white" stroke-width="2"/>',
          '<circle cx="14" cy="14" r="5" fill="white" opacity="0.9"/>',
        '</svg>'
      ].join('');
      return L.divIcon({
        html:        svg,
        className:   '',
        iconSize:    [28, 38],
        iconAnchor:  [14, 38],
        popupAnchor: [0, -42]
      });
    }

    // ── Markers ───────────────────────────────────────────────────
    var markerMap = {};

    function buildPopupHtml(pin) {
      var badge = pin.visited
        ? '<span style="color:#27ae60;font-weight:600;">&#10003; Visited</span>'
        : '<span style="color:#e74c3c;">Not visited yet</span>';
      return '<div style="font-family:Segoe UI,sans-serif;min-width:120px;">'
        + '<strong style="font-size:13px;">' + escapeHtml(pin.name) + '</strong><br>'
        + '<span style="font-size:12px;">' + badge + '</span>'
        + '</div>';
    }

    function addMarkerToMap(pin) {
      var marker = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.visited) })
        .addTo(map)
        .bindPopup(buildPopupHtml(pin));
      markerMap[pin.id] = marker;
    }

    function refreshMarker(pin) {
      var marker = markerMap[pin.id];
      if (!marker) return;
      marker.setIcon(makeIcon(pin.visited));
      marker.setPopupContent(buildPopupHtml(pin));
    }

    function removeMarker(id) {
      if (markerMap[id]) {
        map.removeLayer(markerMap[id]);
        delete markerMap[id];
      }
    }

    // ── Pin operations ────────────────────────────────────────────
    function toggleVisited(id) {
      var pins = loadPins();
      var pin  = null;
      for (var i = 0; i < pins.length; i++) { if (pins[i].id === id) { pin = pins[i]; break; } }
      if (!pin) return;
      pin.visited = !pin.visited;
      savePins(pins);
      refreshMarker(pin);
      renderSidebar();
    }

    function deletePin(id) {
      var pins = loadPins().filter(function (p) { return p.id !== id; });
      savePins(pins);
      removeMarker(id);
      renderSidebar();
    }

    function flyToPin(id) {
      var pins = loadPins();
      var pin  = null;
      for (var i = 0; i < pins.length; i++) { if (pins[i].id === id) { pin = pins[i]; break; } }
      if (!pin || !markerMap[id]) return;
      map.flyTo([pin.lat, pin.lng], 17, { animate: true, duration: 0.7 });
      setTimeout(function () { markerMap[id].openPopup(); }, 750);
    }

    // ── Sidebar ───────────────────────────────────────────────────
    function renderSidebar() {
      var pins    = loadPins();
      var visited = pins.filter(function (p) { return p.visited; }).length;

      document.getElementById('pin-stats').innerHTML =
        '<span>' + pins.length + '</span> pin' + (pins.length !== 1 ? 's' : '')
        + ' &nbsp;·&nbsp; <span>' + visited + '</span> visited';

      var list = document.getElementById('pin-list');
      list.innerHTML = '';

      if (pins.length === 0) {
        list.innerHTML = '<li class="empty-state"><span class="icon">📍</span>Click anywhere on the map to add a pin.</li>';
        return;
      }

      pins.forEach(function (pin) {
        var li = document.createElement('li');
        li.className = 'pin-item' + (pin.visited ? ' visited' : '');
        li.dataset.id = pin.id;
        li.innerHTML =
          '<span class="pin-dot ' + (pin.visited ? 'visited' : 'unvisited') + '"></span>'
          + '<span class="pin-name" title="' + escapeHtml(pin.name) + '">' + escapeHtml(pin.name) + '</span>'
          + '<button class="btn-visit" data-action="visit" data-id="' + pin.id + '">'
          +   (pin.visited ? 'Unmark' : 'Mark visited')
          + '</button>'
          + '<button class="btn-delete" data-action="delete" data-id="' + pin.id + '" title="Remove pin">&#x2715;</button>';
        list.appendChild(li);
      });
    }

    document.getElementById('pin-list').addEventListener('click', function (e) {
      var action = e.target.dataset.action;
      var id     = e.target.dataset.id;

      if (action === 'visit' && id)  { e.stopPropagation(); toggleVisited(id); return; }
      if (action === 'delete' && id) { e.stopPropagation(); deletePin(id);     return; }

      var li = e.target.closest('.pin-item');
      if (li) flyToPin(li.dataset.id);
    });

    // ── Modal ─────────────────────────────────────────────────────
    var pendingLatLng = null;

    var overlay    = document.getElementById('modal-overlay');
    var modalInput = document.getElementById('modal-input');
    var btnConfirm = document.getElementById('modal-confirm');
    var btnCancel  = document.getElementById('modal-cancel');

    function openModal(latlng) {
      pendingLatLng      = latlng;
      modalInput.value   = '';
      modalInput.className = '';
      overlay.classList.add('active');
      // Focus after transition starts
      setTimeout(function () { modalInput.focus(); }, 80);
    }

    function closeModal() {
      overlay.classList.remove('active');
      pendingLatLng = null;
    }

    function submitPin() {
      if (!pendingLatLng) return;                          // safety guard
      var name = modalInput.value.trim();
      if (!name) {
        modalInput.classList.add('error');
        modalInput.focus();
        return;
      }
      modalInput.classList.remove('error');

      var pin = {
        id:      String(Date.now()),
        name:    name,
        lat:     pendingLatLng.lat,
        lng:     pendingLatLng.lng,
        visited: false
      };

      var pins = loadPins();
      pins.push(pin);
      savePins(pins);
      addMarkerToMap(pin);
      renderSidebar();
      closeModal();
      hideHint();
    }

    btnConfirm.addEventListener('click', submitPin);
    btnCancel.addEventListener('click', closeModal);

    modalInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter')  { e.preventDefault(); submitPin(); }
      if (e.key === 'Escape') { closeModal(); }
    });

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closeModal();
    });

    // ── Map click ─────────────────────────────────────────────────
    map.on('click', function (e) { openModal(e.latlng); });

    // ── Clear all ─────────────────────────────────────────────────
    document.getElementById('clear-all').addEventListener('click', function () {
      var pins = loadPins();
      if (!pins.length) return;
      if (!window.confirm('Delete all pins? This cannot be undone.')) return;
      pins.forEach(function (p) { removeMarker(p.id); });
      savePins([]);
      renderSidebar();
    });

    // ── Hint management ───────────────────────────────────────────
    var hintHidden = false;

    function hideHint() {
      if (hintHidden) return;
      hintHidden = true;
      var hint = document.getElementById('map-hint');
      if (!hint) return;
      hint.style.opacity = '0';
      setTimeout(function () { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 900);
    }

    // ── Boot ──────────────────────────────────────────────────────
    var savedPins = loadPins();
    savedPins.forEach(addMarkerToMap);
    renderSidebar();

    if (savedPins.length > 0) {
      hideHint();
    } else {
      setTimeout(hideHint, 5000);
    }

  }); // end DOMContentLoaded
  </script>
</body>
</html>
